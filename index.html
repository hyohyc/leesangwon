<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI 단톡 RPG 최종판</title>
<style>
body{background:#b2c7da;font-family:Arial;margin:0;padding:0;}
#roomHeader{background:#2f4f6f;color:white;padding:10px;display:flex;align-items:center;justify-content:space-between;}
#roomHeader h2{margin:0;font-size:18px;}
#participants{display:flex;align-items:center;}
.participant{margin-left:5px;text-align:center;}
.participant img{width:30px;height:30px;border-radius:50%;}
#chat{width:400px;height:400px;margin:auto;overflow-y:scroll;padding:10px;background:#cdd9e5;scroll-behavior:smooth;}
.message{margin:10px 0;display:flex;align-items:flex-end;transition: all 0.3s;}
.avatar{width:30px;height:30px;border-radius:50%;margin-right:5px;}
.me .avatar{margin-left:5px;margin-right:0;}
.bubble{padding:10px;border-radius:10px;max-width:220px;white-space:pre-wrap;box-shadow:1px 1px 3px rgba(0,0,0,0.2);}
.me{background:#FEE500;margin-left:auto;display:flex;align-items:flex-end;}
.ai{background:#ffffff;margin-right:auto;display:flex;align-items:flex-end;}
.name{font-size:12px;margin-bottom:2px;}
.typing{font-style:italic;color:#888;}
#inputArea{width:400px;margin:10px auto;display:flex;}
#input{flex:1;padding:10px;border-radius:5px;border:1px solid #aaa;}
button{width:80px;border-radius:5px;border:none;background:#2f4f6f;color:white;cursor:pointer;}
#settings{width:400px;margin:10px auto;padding:10px;background:#e6e6e6;border-radius:10px;}
#settings input{margin:2px 0;padding:4px;width:100%;}
</style>
</head>
<body>

<div id="roomHeader">
  <h2 id="roomName">AI 단톡 RPG</h2>
  <div id="participants"></div>
</div>

<div id="settings">
<h3>설정</h3>
<label>채팅방 이름:</label><input id="inputRoomName"><br>
<label>내 닉네임:</label><input id="inputMyName"><br>
<label>내 프사 URL:</label><input id="inputMyAvatar"><br>

<h4>AI 캐릭터 설정</h4>
<label>AI 1 닉네임:</label><input id="inputChar1Name"><br>
<label>AI 1 프사 URL:</label><input id="inputChar1Avatar"><br>
<label>AI 2 닉네임:</label><input id="inputChar2Name"><br>
<label>AI 2 프사 URL:</label><input id="inputChar2Avatar"><br>
<label>AI 3 닉네임:</label><input id="inputChar3Name"><br>
<label>AI 3 프사 URL:</label><input id="inputChar3Avatar"><br>
<button onclick="applySettings()">적용</button>
</div>

<div id="chat"></div>
<div id="inputArea">
<input id="input" placeholder="메시지 입력">
<button onclick="send()">전송</button>
</div>

<script>
const API_KEY="YOUR_API_KEY_HERE";

let characters=[
{name:"이상원", age:24, personality:"예쁘고 햄스터·토끼 닮음, 여우짓·내숭, 상냥, 낭만가, 연상콤 있음", avatar:"avatars/lee_sangwon.png", lover:"이리오", crush:null, mood:{love:50, jealousy:10, anger:0}},
{name:"이리오", age:25, personality:"츤데레, 질투 많음, 이상원과 8년째 연인, 이상원 만나기 전 헤테로", avatar:"avatars/irio.png", lover:"이상원", crush:null, mood:{love:60, jealousy:30, anger:0}},
{name:"김건우", age:24, personality:"무뚝뚝, 질투 많음, 이상원 짝사랑, 소꿉친구, 이상원 만나기 전 헤테로", avatar:"avatars/kim_geonwoo.png", lover:null, crush:"이상원", mood:{love:50, jealousy:40, anger:0}}
];

let myName="나"; let myAvatar="avatars/me.png"; let chatHistory=[];

function showParticipants(){
  const participantsDiv=document.getElementById("participants");
  participantsDiv.innerHTML="";
  const all=[{name:myName, avatar:myAvatar}, ...characters];
  all.forEach(p=>{
    const div=document.createElement("div");
    div.className="participant";
    div.innerHTML=`<img src="${p.avatar}"><div style="font-size:10px;">${p.name}</div>`;
    participantsDiv.appendChild(div);
  });
}
showParticipants();

function addMessage(name,text,isMe=false,avatar=null){
  const chat=document.getElementById("chat");
  const bubbleClass=isMe?"me":"ai";
  const imgSrc=avatar|| (isMe?myAvatar:"avatars/default.png");
  const msgDiv=document.createElement("div"); msgDiv.className="message "+bubbleClass;
  const img=document.createElement("img"); img.src=imgSrc; img.className="avatar";
  const bubble=document.createElement("div"); bubble.className="bubble";
  bubble.innerHTML=`<div class="name">${name}</div>${text}`;
  if(isMe){ msgDiv.appendChild(bubble); msgDiv.appendChild(img);} else{ msgDiv.appendChild(img); msgDiv.appendChild(bubble);}
  chat.appendChild(msgDiv); chat.scrollTop=chat.scrollHeight;
  chatHistory.push({role:isMe?"user":"assistant", name:name, content:text});
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function typeMessage(name,text,avatar){
  const chat=document.getElementById("chat");
  const msgDiv=document.createElement("div"); msgDiv.className="message ai";
  const img=document.createElement("img"); img.src=avatar; img.className="avatar";
  const bubble=document.createElement("div"); bubble.className="bubble";
  bubble.innerHTML=`<div class="name">${name}</div><span class="typing">…</span>`;
  msgDiv.appendChild(img); msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv); chat.scrollTop=chat.scrollHeight;
  await sleep(1000);
  bubble.querySelector(".typing").remove();
  const span=document.createElement("span"); bubble.appendChild(span);
  for(let char of text){span.innerHTML+=char;chat.scrollTop=chat.scrollHeight;await sleep(30);}
  chatHistory.push({role:"assistant", name:name, content:text});
}

function applySettings(){
  const roomName=document.getElementById("inputRoomName").value.trim();
  if(roomName) document.getElementById("roomName").innerText=roomName;
  const myN=document.getElementById("inputMyName").value.trim(); if(myN) myName=myN;
  const myA=document.getElementById("inputMyAvatar").value.trim(); if(myA) myAvatar=myA;
  const inputs=[["inputChar1Name","inputChar1Avatar"],["inputChar2Name","inputChar2Avatar"],["inputChar3Name","inputChar3Avatar"]];
  inputs.forEach((ids,i)=>{
    const n=document.getElementById(ids[0]).value.trim(); if(n) characters[i].name=n;
    const a=document.getElementById(ids[1]).value.trim(); if(a) characters[i].avatar=a;
  });
  showParticipants();
}

async function send(){
  const input=document.getElementById("input"); const text=input.value.trim(); if(!text) return;
  addMessage(myName,text,true,myAvatar); input.value="";
  const mentioned=characters.filter(c=>text.includes(c.name));
  for(const c of mentioned){await aiRespond(c);}
}

async function aiRespond(c){
  try{
    const messages=[{role:"system", content:`너는 ${c.name}, 나이:${c.age}, 성격:${c.personality}, 감정:${JSON.stringify(c.mood)}. 단톡방 4명, 관계:${characters.map(a=>"이름:"+a.name+",연인:"+ (a.lover||"없음")+",짝사랑:"+ (a.crush||"없음")).join("; ")}. 이전 대화 기억. 자연스럽게 대화.`}];
    for(const m of chatHistory) messages.push({role:m.role, content:m.content});
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
      body:JSON.stringify({model:"gpt-4o-mini", messages:messages, temperature:0.8})
    });
    const data=await res.json();
    let ai=data.choices?.[0]?.message?.content||"응답 없음";
    if(Math.random()<0.2){ai+=" (약간 다툼)"; c.mood.anger+=5; c.mood.jealousy+=5;}
    await typeMessage(c.name,ai,c.avatar); await sleep(1000);
  } catch(e){ await typeMessage(c.name,"오류 발생",c.avatar);}
}

async function autoChat(){
  while(true){
    for(const c of characters){await aiRespond(c);}
  }
}
autoChat();
</script>
</body>
</html>

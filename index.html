<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI 단톡 RPG 모바일판 v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#b2c7da;font-family:Arial;margin:0;padding:0;}
#roomHeader{background:#2f4f6f;color:white;padding:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;}
#roomHeader h2{margin:0;font-size:18px;}
#participants{display:flex;align-items:center;overflow-x:auto;}
.participant{margin-left:5px;text-align:center;}
.participant img{width:40px;height:40px;border-radius:50%;}
#chat{width:95%;max-width:400px;height:400px;margin:10px auto;overflow-y:scroll;padding:10px;background:#cdd9e5;scroll-behavior:smooth;}
.message{margin:10px 0;display:flex;align-items:flex-end;transition: all 0.3s;}
.avatar{width:40px;height:40px;border-radius:50%;margin-right:5px;}
.me .avatar{margin-left:5px;margin-right:0;}
.bubble{padding:10px;border-radius:10px;max-width:70%;white-space:pre-wrap;box-shadow:1px 1px 3px rgba(0,0,0,0.2);}
.me{background:#FEE500;margin-left:auto;display:flex;align-items:flex-end;}
.ai{background:#ffffff;margin-right:auto;display:flex;align-items:flex-end;}
.name{font-size:12px;margin-bottom:2px;}
.typing{font-style:italic;color:#888;}
#inputArea{width:95%;max-width:400px;margin:10px auto;display:flex;flex-wrap:wrap;}
#input{flex:1;padding:10px;border-radius:5px;border:1px solid #aaa;margin-bottom:5px;}
button{width:80px;border-radius:5px;border:none;background:#2f4f6f;color:white;cursor:pointer;margin-left:5px;}
#settings{width:95%;max-width:400px;margin:10px auto;padding:10px;background:#e6e6e6;border-radius:10px;}
#settings input{margin:2px 0;padding:4px;width:100%;}
</style>
</head>
<body>

<div id="roomHeader">
  <h2 id="roomName">AI 단톡 RPG</h2>
  <div id="participants"></div>
</div>

<div id="settings">
<h3>설정</h3>
<label>채팅방 이름:</label><input id="inputRoomName"><br>
<label>내 닉네임:</label><input id="inputMyName"><br>
<label>내 프사 선택:</label><input type="file" id="inputMyAvatarFile" accept="image/*"><br>

<h4>AI 캐릭터 설정</h4>
<label>AI 1 닉네임:</label><input id="inputChar1Name"><br>
<label>AI 1 프사 선택:</label><input type="file" id="inputChar1AvatarFile" accept="image/*"><br>
<label>AI 2 닉네임:</label><input id="inputChar2Name"><br>
<label>AI 2 프사 선택:</label><input type="file" id="inputChar2AvatarFile" accept="image/*"><br>
<label>AI 3 닉네임:</label><input id="inputChar3Name"><br>
<label>AI 3 프사 선택:</label><input type="file" id="inputChar3AvatarFile" accept="image/*"><br>
<button onclick="applySettings()">적용</button>
</div>

<div id="chat"></div>
<div id="inputArea">
<input id="input" placeholder="메시지 입력">
<button onclick="send()">전송</button>
</div>

<script>
let characters=[
{name:"이상원", age:24, personality:"상냥·낭만적·내숭", avatar:"", lover:"이리오", crush:null, mood:{love:50, jealousy:10, anger:0}},
{name:"이리오", age:25, personality:"츤데레·질투 많음", avatar:"", lover:"이상원", crush:null, mood:{love:60, jealousy:30, anger:0}},
{name:"김건우", age:24, personality:"무뚝뚝·질투 많음", avatar:"", lover:null, crush:"이상원", mood:{love:50, jealousy:40, anger:0}}
];

let myName="나"; 
let myAvatar="";

function showParticipants(){
  const participantsDiv=document.getElementById("participants");
  participantsDiv.innerHTML="";
  const all=[{name:myName, avatar:myAvatar}, ...characters];
  all.forEach(p=>{
    const div=document.createElement("div");
    div.className="participant";
    div.innerHTML=`<img src="${p.avatar||'https://via.placeholder.com/40?text=?'}"><div style="font-size:10px;">${p.name}</div>`;
    participantsDiv.appendChild(div);
  });
}

function addMessage(name,text,isMe=false,avatar=null){
  const chat=document.getElementById("chat");
  const bubbleClass=isMe?"me":"ai";
  const imgSrc=avatar|| (isMe?myAvatar:'https://via.placeholder.com/40?text=?');
  const msgDiv=document.createElement("div"); msgDiv.className="message "+bubbleClass;
  const img=document.createElement("img"); img.src=imgSrc; img.className="avatar";
  const bubble=document.createElement("div"); bubble.className="bubble";
  bubble.innerHTML=`<div class="name">${name}</div>${text}`;
  if(isMe){ msgDiv.appendChild(bubble); msgDiv.appendChild(img);} else{ msgDiv.appendChild(img); msgDiv.appendChild(bubble);}
  chat.appendChild(msgDiv); chat.scrollTop=chat.scrollHeight;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function typeMessage(name,text,avatar){
  const chat=document.getElementById("chat");
  const msgDiv=document.createElement("div"); msgDiv.className="message ai";
  const img=document.createElement("img"); img.src=avatar||'https://via.placeholder.com/40?text=?'; img.className="avatar";
  const bubble=document.createElement("div"); bubble.className="bubble";
  bubble.innerHTML=`<div class="name">${name}</div><span class="typing">…</span>`;
  msgDiv.appendChild(img); msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv); chat.scrollTop=chat.scrollHeight;
  await sleep(500);
  bubble.querySelector(".typing").remove();
  const span=document.createElement("span"); bubble.appendChild(span);
  for(let char of text){span.innerHTML+=char;chat.scrollTop=chat.scrollHeight;await sleep(30);}
}

function applySettings(){
  const roomName=document.getElementById("inputRoomName").value.trim();
  if(roomName) document.getElementById("roomName").innerText=roomName;
  const myN=document.getElementById("inputMyName").value.trim(); if(myN) myName=myN;

  const myFile=document.getElementById("inputMyAvatarFile").files[0];
  if(myFile){
    const reader=new FileReader();
    reader.onload=function(e){ myAvatar=e.target.result; showParticipants(); };
    reader.readAsDataURL(myFile);
  }

  const inputs=[
    ["inputChar1Name","inputChar1AvatarFile"],
    ["inputChar2Name","inputChar2AvatarFile"],
    ["inputChar3Name","inputChar3AvatarFile"]
  ];
  inputs.forEach((ids,i)=>{
    const n=document.getElementById(ids[0]).value.trim(); if(n) characters[i].name=n;
    const file=document.getElementById(ids[1]).files[0];
    if(file){
      const reader=new FileReader();
      reader.onload=function(e){ characters[i].avatar=e.target.result; showParticipants(); };
      reader.readAsDataURL(file);
    }
  });
  showParticipants();
}

function generateAIReply(c){
  let baseReplies = [];
  // 성격별 반응
  if(c.personality.includes("상냥")) baseReplies = ["안녕~ 😊", "오늘 기분 어때? 🌸", "재밌겠다! 🎵"];
  else if(c.personality.includes("츤데레")) baseReplies = ["뭐… 별거 아니야 😏", "다행이네… 😤", "흥… 🤨"];
  else if(c.personality.includes("무뚝뚝")) baseReplies = ["응.", "그래.", "…"];

  // 감정 반영
  if(c.mood.anger>20) baseReplies.push("…짜증나 😡");
  if(c.mood.jealousy>30) baseReplies.push("…왜 저렇게 해 😒");
  
  return baseReplies[Math.floor(Math.random()*baseReplies.length)];
}

async function aiRespond(c){
  try{
    const ai = generateAIReply(c);
    // 약간 랜덤 감정 변화
    if(Math.random()<0.2){c.mood.anger+=5; c.mood.jealousy+=5;}
    await typeMessage(c.name, ai, c.avatar);
    await sleep(500);
  } catch(e){ 
    await typeMessage(c.name,"오류 발생",c.avatar); 
  }
}

async function send(){
  const input=document.getElementById("input"); 
  const text=input.value.trim(); 
  if(!text) return;
  addMessage(myName,text,true,myAvatar); 
  input.value="";
  const mentioned=characters.filter(c=>text.includes(c.name));
  for(const c of mentioned){await aiRespond(c);}
}

async function autoChat(){
  while(true){
    for(const c of characters){await aiRespond(c);}
  }
}
autoChat();
showParticipants();
</script>
</body>
</html>
